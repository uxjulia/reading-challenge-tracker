networks:
  frontend:
    external: true

services:
  reading-challenge:
    container_name: reading-challenge
    build: .
    networks:
      - frontend
    env_file:
      - .env
    volumes:
      # Persists the SQLite database across container rebuilds.
      # If books.db doesn't exist yet, create it first: touch books.db
      - /home/julia/code/reading-challenge-tracker/data:/app/data
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
